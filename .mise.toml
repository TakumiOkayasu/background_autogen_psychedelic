[tools]
flutter = "3.41"

[tasks.dev]
description = "macOSデスクトップで実行"
run = "flutter run -d macos"

[tasks."dev:ios"]
description = "iOSシミュレータを起動して実行"
run = """
flutter emulators --launch apple_ios_simulator
sleep 3
flutter run -d iPhone
"""

[tasks."dev:android"]
description = "Androidエミュレータで実行"
run = "flutter run -d emulator"

[tasks."dev:chrome"]
description = "Chromeで実行"
run = "flutter run -d chrome"

[tasks."dev:pick"]
description = "デバイスを選択して実行"
run = "flutter run"

[tasks.test]
description = "全テスト実行"
run = "flutter test"

[tasks.analyze]
description = "静的解析"
run = "flutter analyze"

[tasks.clean]
description = "ビルドキャッシュ削除"
run = "flutter clean && flutter pub get"
