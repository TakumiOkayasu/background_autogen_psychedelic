[tools]
flutter = "3.41"

[tasks.dev]
description = "macOSデスクトップで実行"
run = "flutter run -d macos"

[tasks.emu]
description = "利用可能なエミュレータ一覧"
run = "flutter emulators"

[tasks."emu:ios"]
description = "iOSシミュレータ起動"
run = """
open -a Simulator
xcrun simctl boot booted 2>/dev/null || true
echo "iOSシミュレータを起動しました"
"""

[tasks."emu:android"]
description = "Androidエミュレータ起動"
run = """
if ! command -v emulator &>/dev/null; then
  echo "Error: emulatorコマンドが見つかりません。\$ANDROID_HOME/emulator をPATHに追加してください。"
  exit 1
fi
AVD="${1:-$(emulator -list-avds | head -1)}"
if [ -z "$AVD" ]; then
  echo "Error: AVDが見つかりません。Android Studioで作成してください。"
  exit 1
fi
echo "起動中: $AVD"
emulator -avd "$AVD" &
"""

[tasks."dev:ios"]
description = "iOSシミュレータで実行"
depends = ["emu:ios"]
run = """
echo "シミュレータのブート待機中..."
while ! xcrun simctl list devices booted 2>/dev/null | grep -q "Booted"; do
  sleep 1
done
flutter run -d iPhone
"""

[tasks."dev:android"]
description = "Androidエミュレータで実行"
run = "flutter run -d emulator"

[tasks."dev:chrome"]
description = "Chromeで実行"
run = "flutter run -d chrome"

[tasks."dev:pick"]
description = "デバイスを選択して実行"
run = "flutter run"

[tasks.test]
description = "全テスト実行"
run = "flutter test"

[tasks.analyze]
description = "静的解析"
run = "flutter analyze"

[tasks.clean]
description = "ビルドキャッシュ削除"
run = "flutter clean && flutter pub get"
